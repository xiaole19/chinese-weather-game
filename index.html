<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气预报汉语学习游戏</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B6B;
            --success: #27AE60;
            --danger: #E74C3C;
            --dark: #2C3E50;
            --light: #ECF0F1;
            --blue: #3498DB;
            --purple: #667eea;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        body {
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--dark);
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow);
            max-width: 1000px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .title {
            font-size: 36px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #7F8C8D;
        }

        .screen {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ===== LOGIN SCREEN ===== */
        .login-screen {
            text-align: center;
        }

        .login-banner {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            border-radius: 16px;
            margin-bottom: 40px;
        }

        .login-banner h2 {
            font-size: 28px;
            margin-bottom: 15px;
        }

        .login-form {
            background: #F5F7FA;
            padding: 40px;
            border-radius: 16px;
            max-width: 400px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 10px;
            text-align: left;
        }

        .form-input {
            width: 100%;
            padding: 14px;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .error-message {
            color: var(--danger);
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .start-button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .start-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        /* ===== GAME SCREEN ===== */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #E0E0E0;
        }

        .student-info {
            font-size: 14px;
            font-weight: 600;
            color: var(--dark);
        }

        .level-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--light);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .level-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .level-name {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .level-desc {
            font-size: 14px;
            color: #7F8C8D;
        }

        .question-box {
            background: linear-gradient(135deg, #F5F7FA 0%, #F0F3F7 100%);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 4px solid var(--primary);
        }

        .question-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 15px;
            gap: 10px;
        }

        .question-left {
            flex: 1;
        }

        .question-number {
            font-size: 12px;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
        }

        .audio-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF9F43 0%, #EE5A6F 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 159, 67, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .audio-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 16px rgba(255, 159, 67, 0.4);
        }

        .audio-btn.playing {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .question-text {
            font-size: 20px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .question-image {
            font-size: 48px;
            text-align: center;
            margin: 20px 0;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option {
            background: white;
            border: 2px solid #E0E0E0;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 32px;
            color: var(--dark);
            font-weight: 500;
        }

        .option:hover:not(.disabled) {
            border-color: #4ECDC4;
            background: rgba(78, 205, 196, 0.05);
            transform: translateX(4px);
        }

        .option.correct {
            border-color: var(--success);
            background: rgba(39, 174, 96, 0.1);
        }

        .option.incorrect {
            border-color: var(--danger);
            background: rgba(231, 76, 60, 0.1);
        }

        .option.disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .option ruby {
            font-size: 0.6em;
            color: #8E44AD;
        }

        .pinyin-inline {
            font-size: 14px;
            color: #8E44AD;
            font-weight: 400;
            margin-left: 4px;
        }

        .radio {
            width: 18px;
            height: 18px;
            border: 2px solid #CCC;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .option.correct .radio,
        .option.incorrect .radio {
            background: var(--success);
            border-color: var(--success);
        }

        .option.incorrect .radio {
            background: var(--danger);
            border-color: var(--danger);
        }

        .navigation {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: white;
            color: var(--dark);
            border: 2px solid #E0E0E0;
        }

        /* ===== FEEDBACK MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            overflow-y: auto;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.4s ease;
            max-width: 750px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            padding: 30px;
            border-bottom: 4px solid #E0E0E0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header.correct {
            background: linear-gradient(135deg, rgba(39, 174, 96, 0.15) 0%, rgba(46, 204, 113, 0.15) 100%);
            border-bottom-color: var(--success);
        }

        .modal-header.incorrect {
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.15) 0%, rgba(245, 141, 109, 0.15) 100%);
            border-bottom-color: var(--danger);
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
        }

        .modal-header.correct .modal-title {
            color: var(--success);
        }

        .modal-header.incorrect .modal-title {
            color: var(--danger);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s ease;
        }

        .modal-close:hover {
            color: var(--dark);
        }

        .modal-body {
            padding: 30px;
        }

        .feedback-section {
            margin-bottom: 25px;
        }

        .feedback-section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            color: #667eea;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-content {
            padding: 15px;
            background: #F5F7FA;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.8;
            color: var(--dark);
        }

        .english-note {
            background: linear-gradient(135deg, rgba(52, 152, 219, 0.08) 0%, rgba(52, 152, 219, 0.05) 100%);
            border-left: 4px solid #3498DB;
            padding: 18px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            line-height: 1.9;
            color: #1E5A8E;
            font-weight: 500;
        }

        .modal-footer {
            padding: 20px 30px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            border-top: 1px solid #E0E0E0;
            background: #F9F9F9;
        }

        .btn-modal {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-modal-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-modal-secondary {
            background: white;
            color: var(--dark);
            border: 2px solid #E0E0E0;
        }

        /* ===== REPORT SCREEN ===== */
        .report-screen {
            padding: 20px 0;
        }

        .report-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #E0E0E0;
        }

        .report-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 10px;
        }

        .report-subtitle {
            font-size: 14px;
            color: #7F8C8D;
        }

        .student-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            text-align: center;
        }

        .card-item {
            padding: 10px;
        }

        .card-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 8px;
            display: block;
        }

        .card-value {
            font-size: 24px;
            font-weight: 700;
            display: block;
        }

        .report-section {
            margin-bottom: 30px;
        }

        .section-header {
            font-size: 18px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary);
        }

        .question-item {
            background: white;
            border: 1px solid #E0E0E0;
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .question-item.correct {
            border-left: 4px solid var(--success);
        }

        .question-item.incorrect {
            border-left: 4px solid var(--danger);
        }

        .question-content {
            flex: 1;
        }

        .question-text-report {
            font-weight: 600;
            color: var(--dark);
            font-size: 15px;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .question-answer {
            font-size: 13px;
            margin: 5px 0;
        }

        .answer-label {
            color: #7F8C8D;
            font-weight: 600;
            margin-right: 8px;
        }

        .student-answer-text {
            color: var(--dark);
            font-weight: 500;
        }

        .correct-answer-text {
            color: var(--success);
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            flex-shrink: 0;
            margin-left: 10px;
        }

        .status-badge.correct {
            background: rgba(39, 174, 96, 0.2);
            color: var(--success);
        }

        .status-badge.incorrect {
            background: rgba(231, 76, 60, 0.2);
            color: var(--danger);
        }

        .teacher-evaluation {
            background: linear-gradient(135deg, rgba(52, 152, 219, 0.08) 0%, rgba(52, 152, 219, 0.05) 100%);
            border: 2px solid rgba(52, 152, 219, 0.2);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .teacher-evaluation-title {
            font-weight: 700;
            color: #3498DB;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .teacher-evaluation-text {
            color: #1E5A8E;
            font-size: 14px;
            line-height: 2;
            font-weight: 500;
            white-space: pre-wrap;
        }

        .report-actions {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            justify-content: center;
        }

        .print-btn,
        .again-btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .print-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .print-btn:hover {
            transform: translateY(-2px);
        }

        .again-btn {
            background: white;
            color: var(--dark);
            border: 2px solid #E0E0E0;
        }

        .again-btn:hover {
            border-color: var(--purple);
            background: rgba(102, 126, 234, 0.05);
        }

        @media print {
            body { background: white; }
            .container { box-shadow: none; padding: 0; }
            .report-actions { display: none; }
            .modal { display: none; }
        }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            .title { font-size: 24px; }
            .card-grid { grid-template-columns: 1fr; }
            .report-actions { flex-direction: column; }
            .print-btn, .again-btn { width: 100%; }
            .question-item { flex-direction: column; }
            .status-badge { margin-left: 0; margin-top: 8px; }
            .question-header { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">☀️ 天气预报汉语学习游戏</div>
            <div class="subtitle">基础汉语互动教学</div>
        </div>

        <!-- ===== LOGIN SCREEN ===== -->
        <div class="screen active login-screen" id="loginScreen">
            <div class="login-banner">
                <h2>欢迎学习天气汉语！</h2>
                <p style="line-height: 1.8; font-size: 15px;">
                    这个游戏有 3 个关卡，帮助你学习天气相关的汉语词汇、逻辑和语法。<br>
                    让我们开始挑战吧！
                </p>
            </div>

            <div class="login-form">
                <div class="form-group">
                    <label class="form-label">请输入你的名字</label>
                    <input 
                        type="text" 
                        id="studentName" 
                        class="form-input" 
                        placeholder="例如：张三"
                        onkeypress="if(event.key==='Enter') game.startFromLogin()"
                    >
                    <div class="error-message" id="nameError">请输入名字后再开始游戏</div>
                </div>

                <button class="start-button" onclick="game.startFromLogin()">
                    <i class="fas fa-play"></i> 开始游戏
                </button>
            </div>
        </div>

        <!-- ===== GAME SCREEN ===== -->
        <div class="screen" id="gameScreen">
            <div class="game-header">
                <div class="student-info">
                    学生：<strong id="studentNameDisplay"></strong>
                </div>
                <div class="level-badge" id="levelBadge">第 1 关</div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressBar"></div>
            </div>

            <div class="level-title">
                <div class="level-name" id="levelTitle"></div>
                <div class="level-desc" id="levelDesc"></div>
            </div>

            <div class="question-box">
                <div class="question-header">
                    <div class="question-left">
                        <div class="question-number" id="questionNumber"></div>
                    </div>
                    <button class="audio-btn" id="audioBtn" title="听题目" onclick="game.playPreAnswerAudio()">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>
                <div class="question-text" id="questionText"></div>
                <div class="question-image" id="questionImage"></div>
            </div>

            <div class="options" id="optionsContainer"></div>

            <div class="navigation">
                <button class="btn btn-secondary" onclick="game.restart()" style="display:none;" id="restartBtn">
                    <i class="fas fa-redo"></i> 重新开始
                </button>
                <button class="btn btn-primary" onclick="game.nextQuestion()" style="display:none;" id="nextBtn">
                    下一题 <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <!-- ===== REPORT SCREEN ===== -->
        <div class="screen" id="reportScreen">
            <div class="report-header">
                <div class="report-title">📊 学习成果报告</div>
                <div class="report-subtitle">游戏已完成，以下是你的详细分析</div>
            </div>

            <div class="student-card">
                <div class="card-grid">
                    <div class="card-item">
                        <span class="card-label">学生名字</span>
                        <span class="card-value" id="reportStudentName">-</span>
                    </div>
                    <div class="card-item">
                        <span class="card-label">总得分</span>
                        <span class="card-value" id="reportScore">0/0</span>
                    </div>
                    <div class="card-item">
                        <span class="card-label">准确率</span>
                        <span class="card-value" id="reportAccuracy">0%</span>
                    </div>
                </div>
            </div>

            <div class="report-section">
                <div class="section-header">📝 答题详情</div>
                <div id="questionDetails"></div>
            </div>

            <div class="teacher-evaluation">
                <div class="teacher-evaluation-title">👨‍🏫 老师的诊断建议 (Teacher's Evaluation)</div>
                <div class="teacher-evaluation-text" id="teacherEvaluation"></div>
            </div>

            <div class="report-actions">
                <button class="print-btn" onclick="window.print()">
                    <i class="fas fa-print"></i> 打印/保存
                </button>
                <button class="again-btn" onclick="game.resetAndLogin()">再次挑战</button>
            </div>
        </div>
    </div>

    <!-- Feedback Modal -->
    <div class="modal" id="feedbackModal">
        <div class="modal-content">
            <div class="modal-header" id="modalHeader">
                <div class="modal-title" id="modalTitle"></div>
                <button class="modal-close" onclick="game.closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn-modal btn-modal-secondary" onclick="game.closeModal()">关闭</button>
                <button class="btn-modal btn-modal-primary" onclick="game.playPostAnswerAudio()">

        class WeatherGame {
            constructor() {
                this.studentName = '';
                this.currentLevel = 0;
                this.currentQuestion = 0;
                this.score = 0;
                this.totalQuestions = 0;
                this.stats = {
                    vocabulary: { correct: 0, incorrect: 0 },
                    logic: { correct: 0, incorrect: 0 },
                    grammar: { correct: 0, incorrect: 0 }
                };
                this.answered = false;
                this.currentQuestion_ = null;
                this.currentFeedback_ = null;
                this.currentCorrectOption_ = null;
                this.questionRecords = [];
            }

            startFromLogin() {
                const nameInput = document.getElementById('studentName');
                const nameValue = nameInput.value.trim();

                if (!nameValue) {
                    document.getElementById('nameError').classList.add('show');
                    return;
                }

                this.studentName = nameValue;
                document.getElementById('nameError').classList.remove('show');
                this.startGame();
            }

            startGame() {
                this.currentLevel = 0;
                this.currentQuestion = 0;
                this.score = 0;
                this.totalQuestions = gameData.levels.reduce((sum, l) => sum + l.questions.length, 0);
                this.stats = { vocabulary: { correct: 0, incorrect: 0 }, logic: { correct: 0, incorrect: 0 }, grammar: { correct: 0, incorrect: 0 } };
                this.questionRecords = [];
                this.answered = false;

                document.getElementById('studentNameDisplay').textContent = this.studentName;
                this.showScreen('gameScreen');
                this.loadQuestion();
            }

            loadQuestion() {
                const level = gameData.levels[this.currentLevel];
                const question = level.questions[this.currentQuestion];
                this.currentQuestion_ = question;

                document.getElementById('levelTitle').textContent = level.name;
                document.getElementById('levelDesc').textContent = level.desc;
                document.getElementById('levelBadge').textContent = `第 ${this.currentLevel + 1} 关`;
                document.getElementById('questionNumber').textContent = `题 ${this.currentQuestion + 1}`;
                document.getElementById('questionText').textContent = question.text;
                document.getElementById('questionImage').textContent = question.image;

                const optionsContainer = document.getElementById('optionsContainer');
                optionsContainer.innerHTML = '';

                question.options.forEach((option, index) => {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'option';
                    optionDiv.innerHTML = `<div class="radio"></div><span>${this.addPinyinToOption(option.text)}</span>`;
                    optionDiv.onclick = () => this.selectOption(index, option.correct, option, question, level.category);
                    optionsContainer.appendChild(optionDiv);
                });

                document.getElementById('nextBtn').style.display = 'none';
                this.updateUI();
                this.answered = false;
            }

            selectOption(index, isCorrect, option, question, category) {
                if (this.answered) return;
                this.answered = true;

                const options = document.querySelectorAll('.option');
                options.forEach(opt => opt.classList.add('disabled'));

                const correctOption = question.options.find(o => o.correct);
                this.currentCorrectOption_ = correctOption;

                this.questionRecords.push({
                    text: question.text,
                    studentAnswer: option.text,
                    correctAnswer: correctOption.text,
                    isCorrect: isCorrect,
                    category: category
                });

                if (isCorrect) {
                    options[index].classList.add('correct');
                    this.score++;
                    this.stats[category].correct++;
                } else {
                    options[index].classList.add('incorrect');
                    this.stats[category].incorrect++;
                    const correctIndex = question.options.findIndex(o => o.correct);
                    options[correctIndex].classList.add('correct');
                }

                this.currentFeedback_ = isCorrect ? question.feedback.correct : question.feedback.incorrect;
                this.showFeedback(isCorrect);
                this.updateUI();

                setTimeout(() => {
                    document.getElementById('nextBtn').style.display = 'inline-block';
                }, 600);
            }

            showFeedback(isCorrect) {
                const modal = document.getElementById('feedbackModal');
                const modalHeader = document.getElementById('modalHeader');
                const modalTitle = document.getElementById('modalTitle');
                const modalBody = document.getElementById('modalBody');

                modalHeader.className = isCorrect ? 'modal-header correct' : 'modal-header incorrect';
                modalTitle.textContent = this.currentFeedback_.praise;

                const html = `
                    <div class="feedback-section">
                        <div class="section-title">${isCorrect ? '✓ 解释' : '✗ 解释'}</div>
                        <div class="section-content">${this.currentFeedback_.explanation}</div>
                    </div>
                    <div class="feedback-section">
                        <div class="section-title">📝 英文详细说明</div>
                        <div class="english-note">${this.currentFeedback_.english}</div>
                    </div>
                `;

                modalBody.innerHTML = html;
                modal.classList.add('show');
            }

            playPreAnswerAudio() {
                const question = this.currentQuestion_;
                if (!question.preAnswerAudio) return;

                const utterance = new SpeechSynthesisUtterance(question.preAnswerAudio);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.8;
                
                const audioBtn = document.getElementById('audioBtn');
                audioBtn.classList.add('playing');
                
                utterance.onend = () => {
                    audioBtn.classList.remove('playing');
                };
                
                window.speechSynthesis.speak(utterance);
            }

            playPostAnswerAudio() {
                if (!this.currentCorrectOption_ || !this.currentCorrectOption_.postAnswerAudio) return;

                const utterance = new SpeechSynthesisUtterance(this.currentCorrectOption_.postAnswerAudio);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.8;
                window.speechSynthesis.speak(utterance);
            }

            nextQuestion() {
                this.currentQuestion++;

                if (this.currentQuestion >= gameData.levels[this.currentLevel].questions.length) {
                    this.currentQuestion = 0;
                    this.currentLevel++;

                    if (this.currentLevel >= gameData.levels.length) {
                        this.showResults();
                        return;
                    }
                }

                this.loadQuestion();
            }

            showResults() {
                const totalCorrect = Object.values(this.stats).reduce((sum, cat) => sum + cat.correct, 0);
                const accuracy = Math.round((totalCorrect / this.totalQuestions) * 100);

                document.getElementById('reportStudentName').textContent = this.studentName;
                document.getElementById('reportScore').textContent = `${totalCorrect}/${this.totalQuestions}`;
                document.getElementById('reportAccuracy').textContent = `${accuracy}%`;

                this.generateQuestionDetails();
                this.generateTeacherEvaluation();

                this.showScreen('reportScreen');
            }

            generateQuestionDetails() {
                let html = '';
                this.questionRecords.forEach((record, index) => {
                    const statusClass = record.isCorrect ? 'correct' : 'incorrect';
                    const statusText = record.isCorrect ? '✓ 正确' : '✗ 错误';

                    html += `
                        <div class="question-item ${statusClass}">
                            <div class="question-content">
                                <div class="question-text-report">${index + 1}. ${record.text}</div>
                                <div class="question-answer">
                                    <span class="answer-label">你的答案：</span>
                                    <span class="student-answer-text">${record.studentAnswer}</span>
                                </div>
                                <div class="question-answer">
                                    <span class="answer-label">正确答案：</span>
                                    <span class="correct-answer-text">${record.correctAnswer}</span>
                                </div>
                            </div>
                            <div class="status-badge ${statusClass}">${statusText}</div>
                        </div>
                    `;
                });
                document.getElementById('questionDetails').innerHTML = html;
            }

            generateTeacherEvaluation() {
                const totalCorrect = Object.values(this.stats).reduce((sum, cat) => sum + cat.correct, 0);
                const accuracy = Math.round((totalCorrect / this.totalQuestions) * 100);

                let evaluation = '';

                if (accuracy === 100) {
                    evaluation = `Perfect score! ${this.studentName} demonstrates excellent mastery across all learning objectives. The student clearly understands: (1) Chinese weather vocabulary and the distinction between weather conditions (like 阴天), measurement units (like 度), and informational concepts (like 预报); (2) logical relationships between weather states and temperature levels, including seasonal patterns; (3) complex grammar structures, particularly the cause-effect pattern (因为...所以...) and the expression of personal desires (希望). This student is ready for more advanced topics.`;
                } else if (accuracy >= 80) {
                    evaluation = `Strong performance! ${this.studentName} demonstrates solid understanding of most concepts. The student has successfully grasped the major vocabulary distinctions and shows good logical reasoning about temperature relationships. There is strong command of the cause-effect structure (因为...所以...). Continue practicing these specific grammar patterns and vocabulary, and this student will achieve mastery quickly.`;
                } else if (accuracy >= 60) {
                    evaluation = `Good effort! ${this.studentName} shows developing understanding of Chinese weather concepts and grammar. The student is building comprehension of vocabulary distinctions (weather conditions vs. concepts vs. units) and logical relationships. There are opportunities for improvement in specific areas. Recommend focused practice on the concepts where errors occurred, with attention to understanding the WHY behind each rule, not just memorization.`;
                } else {
                    evaluation = `Learning in progress. ${this.studentName} is beginning to engage with Chinese weather vocabulary and grammar structures. The student would benefit from concentrated review of fundamental vocabulary distinctions and grammar patterns. Focus on: understanding different TYPES of words (weather states vs. units vs. actions), logical relationships between concepts, and the rigid grammatical structures like 因为...所以.... Recommend breaking down each concept into smaller pieces and practicing with concrete examples.`;
                }

                const statsText = `

Performance Summary:
- Vocabulary (第一关): ${this.stats.vocabulary.correct}/${this.stats.vocabulary.correct + this.stats.vocabulary.incorrect} correct
- Logic (第二关): ${this.stats.logic.correct}/${this.stats.logic.correct + this.stats.logic.incorrect} correct
- Grammar (第三关): ${this.stats.grammar.correct}/${this.stats.grammar.correct + this.stats.grammar.incorrect} correct
- Overall Accuracy: ${accuracy}%`;

                document.getElementById('teacherEvaluation').textContent = evaluation + statsText;
            }

            updateUI() {
                const totalAnswered = Object.values(this.stats).reduce((sum, cat) => sum + cat.correct + cat.incorrect, 0);
                const progress = (totalAnswered / this.totalQuestions) * 100;
                document.getElementById('progressBar').style.width = `${progress}%`;
            }

            closeModal() {
                document.getElementById('feedbackModal').classList.remove('show');
            }

            showScreen(screenId) {
                document.querySelectorAll('.screen').forEach(screen => {
                    screen.classList.remove('active');
                });
                document.getElementById(screenId).classList.add('active');
                window.scrollTo(0, 0);
            }

            restart() {
                this.startGame();
            }

            resetAndLogin() {
                document.getElementById('studentName').value = '';
                this.showScreen('loginScreen');
            }

            addPinyinToOption(text) {
                // 拼音映射表
                const pinyinMap = {
                    '阴天': 'yīntiān',
                    '预报': 'yùbào',
                    '见': 'jiàn',
                    '气温': 'qìwēn',
                    '度': 'dù',
                    '冷': 'lěng',
                    '很低': 'hěn dī',
                    '很高': 'hěn gāo',
                    '希望': 'xīwàng',
                    '低 / 高': 'dī / gāo',
                    '高 / 低': 'gāo / dī',
                    '见 / 冷': 'jiàn / lěng',
                    '所以 / 因为': 'suǒyǐ / yīnwèi',
                    '因为 / 所以': 'yīnwèi / suǒyǐ',
                    '希望 / 所以': 'xīwàng / suǒyǐ',
                    '因为': 'yīnwèi',
                    '所以': 'suǒyǐ'
                };

                // 如果文本在映射表中，添加拼音在括号内
                if (pinyinMap[text]) {
                    return `${text} <span class="pinyin-inline">(${pinyinMap[text]})</span>`;
                }

                // 否则返回原文本
                return text;
            }
        }

        const game = new WeatherGame();
    </script>
</body>
</html>
